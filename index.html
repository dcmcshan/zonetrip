<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zone Trip</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="image-listener-page">
    <main class="image-listener-shell" aria-label="Zone Trip listening interface">
      <figure class="image-listener-figure" aria-label="Old-fashioned microphone on a theater stage">
        <picture>
          <source media="(max-width: 620px)" srcset="assets/stage-mirror-mobile.png" />
          <img
            src="assets/stage-mirror-desktop.png"
            alt="Ornate mirror with swirling mist on a theater stage in front of red curtains"
          />
        </picture>
        <div class="mirror-projection" aria-hidden="true"></div>
        <img
          class="microphone-overlay"
          src="assets/microphone-overlay.png"
          alt=""
          aria-hidden="true"
        />
      </figure>

      <section class="listener-runtime" aria-live="polite" hidden>
        <h1 id="booth-title">Zone Trip</h1>
        <label>
          <input id="consent-checkbox" type="checkbox" checked />
          Listening
        </label>
        <div class="meter" aria-hidden="true">
          <span id="meter-bar"></span>
        </div>
        <span id="recording-state">Idle</span>
        <strong id="recording-time">00:00</strong>
        <button id="start-recording" type="button">Start</button>
        <button id="stop-recording" type="button" disabled>Stop</button>
        <button id="update-world-model" type="button" disabled>Update</button>
        <button id="delete-recording" type="button" disabled>Delete</button>
        <div class="recording-review" hidden>
          <audio id="recording-playback" controls></audio>
        </div>
        <p id="booth-message"></p>
      </section>
    </main>

    <script src="booth-config.js"></script>
    <script>
      window.ZoneTripBoothConfig = {
        ...window.ZoneTripBoothConfig,
        autoStart: true,
      };
    </script>
    <script src="booth.js"></script>
  </body>
</html>
